<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Word — Bible Study Platform</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>The Word</h1>
        <p>One place for everything spiritual.</p>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="btn secondary">🌙 Dark</button>
      </div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main>
      <section id="bible" class="panel active"></section>
      <section id="daily" class="panel"></section>
      <section id="guide" class="panel"></section>
      <section id="church" class="panel"></section>
      <section id="notes" class="panel"></section>
      <section id="plans" class="panel"></section>
      <section id="prayer" class="panel"></section>
      <section id="giving" class="panel"></section>
      <section id="history" class="panel"></section>
      <section id="admin" class="panel"></section>
    </main>

    <template id="chatBubbleTemplate">
      <div class="chat-bubble">
        <div class="who"></div>
        <p class="text"></p>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
